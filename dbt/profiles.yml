atlas_insight:
  target: local
  outputs:
    local:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', '/opt/project/storage/warehouse/analytics.duckdb') }}"
      schema: main
      threads: 4
      extensions:
        - httpfs
        - parquet
      external_root: "s3://{{ env_var('MINIO_SILVER_BUCKET', env_var('MINIO_BUCKET', 'atlas-bronze')) }}/silver"
      secrets:
        - type: s3
          key_id: "{{ env_var('AWS_ACCESS_KEY_ID', 'minio') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY', 'minio12345') }}"
          region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
          endpoint: "{{ env_var('MINIO_ENDPOINT', 'http://minio:9000') | replace('http://', '') | replace('https://', '') }}"
          url_style: path
          use_ssl: false

    motherduck:
      type: duckdb
      path: "md:{{ env_var('MOTHERDUCK_DATABASE', 'atlas_insight') }}"
      schema: main
      threads: 4
      token: "{{ env_var('MOTHERDUCK_TOKEN', '') }}"