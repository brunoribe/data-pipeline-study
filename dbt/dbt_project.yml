name: atlas_insight
version: 1.0.0
config-version: 2

profile: atlas_insight

model-paths: ["models"]
target-path: target
clean-targets:
  - target
  - dbt_packages

on-run-start:
  - "{{ register_upstream_external_models() }}"

models:
  atlas_insight:
    silver:
      +materialized: external
      +format: parquet
    gold:
      +materialized: table