version: 2

sources:
  - name: ops
    schema: main
    tables:
      - name: bronze_ingestion_audit
        description: Append-only audit trail emitted by the Dagster bronze ingestion asset.

  - name: crm
    config:
      meta:
        external_location: "s3://{{ env_var('MINIO_BUCKET', 'atlas-bronze') }}/bronze/source_database=crm/source_schema=main/{name}.parquet"
    tables:
      - name: consent_preferences
      - name: crm_customers
      - name: customer_segments

  - name: financial
    config:
      meta:
        external_location: "s3://{{ env_var('MINIO_BUCKET', 'atlas-bronze') }}/bronze/source_database=financial/source_schema=main/{name}.parquet"
    tables:
      - name: accounts
      - name: card_transactions
      - name: customer_change_log
      - name: customers
      - name: merchants

  - name: healthcare
    config:
      meta:
        external_location: "s3://{{ env_var('MINIO_BUCKET', 'atlas-bronze') }}/bronze/source_database=healthcare/source_schema=main/{name}.parquet"
    tables:
      - name: diagnoses
      - name: medical_visits
      - name: patient_change_log
      - name: patients
      - name: providers

  - name: markets
    config:
      meta:
        external_location: "s3://{{ env_var('MINIO_BUCKET', 'atlas-bronze') }}/bronze/source_database=markets/source_schema=main/{name}.parquet"
    tables:
      - name: stock_prices
      - name: ticker_change_log
      - name: tickers