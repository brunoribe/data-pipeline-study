services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dagster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dagster}
      POSTGRES_DB: ${POSTGRES_DB:-dagster}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dagster} -d ${POSTGRES_DB:-dagster}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  dagster:
    build:
      context: ./dagster
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ATLAS_PROJECT_ROOT: /opt/project
      DAGSTER_HOME: /opt/dagster/dagster_home
      PYTHONPATH: /opt/dagster/app
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio12345}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    volumes:
      - .:/opt/project
      - ./dagster:/opt/dagster/app
      - ./dagster/dagster_home:/opt/dagster/dagster_home
    command:
      - sh
      - -c
      - |
        set -e
        python -m atlas_pipeline.bootstrap
        dagster instance migrate
        dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/app/workspace.yaml
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/project/rill/project/data/gold_source_overview.parquet"]
      interval: 10s
      timeout: 5s
      retries: 12

  dagster-daemon:
    build:
      context: ./dagster
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ATLAS_PROJECT_ROOT: /opt/project
      DAGSTER_HOME: /opt/dagster/dagster_home
      PYTHONPATH: /opt/dagster/app
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio12345}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/opt/project
      - ./dagster:/opt/dagster/app
      - ./dagster/dagster_home:/opt/dagster/dagster_home
    command:
      - sh
      - -c
      - |
        set -e
        dagster instance migrate
        dagster-daemon run -w /opt/dagster/app/workspace.yaml

  rill:
    build:
      context: ./rill
    restart: unless-stopped
    environment:
      CI: "1"
      RILL_PORT: ${RILL_PORT:-9009}
      RILL_PROJECT_DIR: /srv/project
    depends_on:
      dagster:
        condition: service_healthy
    ports:
      - "${RILL_PORT:-9009}:9009"
    volumes:
      - ./rill/project:/srv/project

volumes:
  postgres_data:
  minio_data:
